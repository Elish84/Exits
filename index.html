<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול יציאות צמ"ם</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">גדוד 8109 · צוות מוכנות מבצעית</p>
        <h1>ניהול יציאות צמ"ם</h1>
        <p class="subtitle">לוח שנה פשוט, ברור ונגיש לניהול נוכחות, הערות ואילוצים לכל יום.</p>
      </div>
      <div class="hero-actions">
        <button id="saveAllBtn" class="btn primary">שמירת הכל</button>
        <button id="exportBtn" class="btn secondary">ייצוא JSON</button>
      </div>
    </header>

    <section class="panel controls-panel">
      <div class="controls-grid">
        <label>
          <span>כותרת</span>
          <input id="calendarTitle" type="text" value='ניהול יציאות צמ"ם' />
        </label>

        <label>
          <span>חודש</span>
          <input id="monthLabel" type="text" value="חודש נוכחי" />
        </label>

        <label>
          <span>יום התחלה</span>
          <input id="startDay" type="number" min="1" max="31" value="22" />
        </label>

        <label>
          <span>יום סיום</span>
          <input id="endDay" type="number" min="1" max="31" value="31" />
        </label>

        <label>
          <span>יום ראשון בטווח</span>
          <select id="startWeekday">
            <option value="0" selected>ראשון</option>
            <option value="1">שני</option>
            <option value="2">שלישי</option>
            <option value="3">רביעי</option>
            <option value="4">חמישי</option>
            <option value="5">שישי</option>
            <option value="6">שבת</option>
          </select>
        </label>

        <div class="inline-actions">
          <button id="buildBtn" class="btn primary">בניית לוח</button>
          <button id="reloadBtn" class="btn ghost">טעינה מחדש</button>
        </div>
      </div>
      <div id="status" class="status">מאתחל...</div>
    </section>

    <section class="panel summary-panel">
      <div class="summary-header">
        <h2>סיכום שיבוצים</h2>
        <div class="legend">
          <span>אנשי צוות:</span>
          <div class="legend-members" id="legendMembers"></div>
        </div>
      </div>
      <div id="summaryGrid" class="summary-grid"></div>
    </section>

    <section class="calendar-header-row" id="weekdayHeader"></section>
    <main id="calendarGrid" class="calendar-grid"></main>
  </div>

  <template id="dayCardTemplate">
    <article class="day-card">
      <div class="day-top">
        <div>
          <div class="day-weekday"></div>
          <div class="day-date"></div>
        </div>
        <div class="day-badge"></div>
      </div>

      <div class="slots-grid"></div>

      <label class="notes-block">
        <span>הערות חופשיות</span>
        <textarea rows="4" placeholder="חג, אילוץ, שינוי לו"ז, הערות חופשיות..."></textarea>
      </label>

      <div class="card-actions">
        <button class="btn secondary save-day-btn">שמירת יום</button>
        <button class="btn ghost clear-day-btn">ניקוי</button>
      </div>
    </article>
  </template>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
